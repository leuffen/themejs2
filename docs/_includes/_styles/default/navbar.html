{% if page.skip-navbar != true %}

<nte-navbar class="fixed autoborder autoshadow" scroll-threshold="500" style="--spacer-height: var(--osman-navbar-height, 64px);">
    <nte-navbar-line style="--brand-height: var(--osman-navbar-brand-height, 64px)">



        <a slot="brand" href="/">
            <img
                src="/assets/leuffen-logo-big.svg"
                alt="{{ site.data.general.logoalt }}"
                class="loader-image"
                height="64"
                style="float: left"
            />
            ThemeJs2
            <!--div style="font-size: 1.1em; float: right" class="m-2 text-black">
              <div style="font-size: 1.6em">{{ site.data.general.logoalt }}</div>
              <div style="font-size: 1.1em">{{ site.data.general.fachrichtung}}</div>
            </div-->
        </a>

        <nte-nav
            class="nav-horizontal"
            mode="master"
            data-group-name="nav1"
            breakpoint="xl"
            transfer-to="#navSidebar"
            style="--text-color: blue"
        >
            <span slot="menu-text">Menü</span>



            <ul>
                {% include el/navbar.html ptag="nav2" %}
                <li style="order: 30">
                    <a href="javascript:void(0)">Arzt</a>
                    <ul>
                        {% include el/navbar.html ptag="arzt" %}
                    </ul>
                </li>
                <li style="order: 30">
                    <a href="javascript:void(0)">EPraxis</a>
                    <ul>
                        {% include el/navbar.html ptag="epraxis" %}
                    </ul>
                </li>
                <li style="order: 30">
                    <a href="javascript:void(0)">Styles</a>
                    <ul>
                        {% include el/navbar.html ptag="styles" %}
                    </ul>
                </li>
            </ul>
        </nte-nav>
    </nte-navbar-line>
</nte-navbar>


<nte-offcanvas id="navSidebar" data-group-name="nav1">
    <nte-burger slot="header" data-group-name="nav1" data-nt-dismiss="offcanvas" open></nte-burger>
    <nte-nav class="nav-vertical"></nte-nav>
</nte-offcanvas>

{% endif %}




{{ content }}
